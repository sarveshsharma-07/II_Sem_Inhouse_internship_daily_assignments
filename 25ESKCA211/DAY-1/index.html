<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
</head>
<body>
    <div>
        <form action="/server">
            <h1>Registration Form</h1>
            <hr>
            <label for="name">Name:</label>
            <input type="text" placeholder="Enter Name" id="txtname" name="txtname"   required>
            <br><br>
            <label for="email">Email:</label>
            <input type="email" placeholder="Enter Email" id="txtemail" name="txtname" required>
            <br><br>
            <label for="phno">Phone No:</label>
            <input type="number" placeholder="Enter Phone No." id="txtphobne" name="txtname" required>
            <br><br>
            <label for="gender">Gender :</label>
            <input type="radio" id="male" name="gender" value="M">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="F">
            <label for="female">Female</label>
            <input type="radio" id="other" name="gender" value="O">
            <label for="other">Other</label>
            <br><br>
            <label for="dob">DOB:</label>
            <input type="date" id="dob" required>
            <br><br>
            <label for="course">Course</label>
            <select id="course" required  >
                <option>Select</option>
                <option value="CSAI">CS AI</option>
                <option value="CSCore">CS Core</option>
                <option value="CSDS">CS DS</option>
                <option value="CSIT">CS IT</option>

            </select>
            <br><br>
            <label for="pass">Password:</label>
            <input type="password" placeholder="Password" id="pass" >
            <br><br>
            <label for="copass">Password:</label>
            <input type="password" placeholder="Confirm Password" id="pass" >
            <br><br>
            <label for="msg">Address:</label><br>
            <textarea id="msg" placeholder="Enter Address"></textarea>
            <br>
            <input type="checkbox" id="agree" required>
            <label for="agree">Yes,I agree to Terms & Conditions. </label>
            <br><br>
            <center>
            <button type="reset">Reset</button>
            <button>Submit</button>
            </center>     
        </form>
    </div>
</body>
</html>
